{{- if .Values.ingressRouteTCP.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Values.ingressRouteTCP.name | default (printf "%s-passthrough" .Release.Name) }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.ingressRouteTCP.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app: {{ .Release.Name }}
    release: {{ .Release.Name }}
spec:
  entryPoints:
    {{- range .Values.ingressRouteTCP.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - match: HostSNI(`{{ .Values.ingressRouteTCP.host }}`)
      services:
        - name: {{ .Values.ingressRouteTCP.service.name | default .Release.Name }}
          port: {{ .Values.ingressRouteTCP.service.port | default 443 }}
  tls:
    passthrough: {{ .Values.ingressRouteTCP.tls.passthrough | default true }}
{{- end }}