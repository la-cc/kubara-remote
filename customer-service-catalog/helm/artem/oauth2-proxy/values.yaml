namespace:
  labels:
    project-name: "artem"
    stage: "dev"

externalSecrets:

  secretStoreRef:
    kind: ClusterSecretStore
    name: artem-dev


  secrets:
    oauth2-credentials:
      dataFrom:
        - remoteKey: artem/dev/oauth2-proxy/oauth2_credentials


oauth2-proxy:
  imagePullSecrets:
    - name: image-pull-secret
  config:
    existingSecret: oauth2-credentials
    configFile: |-
      reverse_proxy = true
      redirect_url = "https://artem-dev.stackit.run/oauth2/callback"
      whitelist_domains = [ "artem-dev.stackit.run" ]
      email_domains = [ "*" ]
      cookie_secure = true
      upstreams = [ "static://200" ]
      github_org = "la-demos"
      github_team = "g-gitops"
      provider = "github"
      scope = "read:user user:email read:org"
  ingress:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    enabled: true
    path: /oauth2
    pathType: Prefix
    hosts:
      - artem-dev.stackit.run
    tls:
      - secretName: tls-oauth2-proxy
        hosts:
          - artem-dev.stackit.run
  metrics:
    serviceMonitor:
      enabled: true
      labels:
        monitoring.instance: "artem-dev"


middleware:
  name: oauth-auth
  namespace: oauth2-proxy

  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/
    trustForwardHeader: true

    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
