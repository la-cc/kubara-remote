crds:
  install: true

namespace:
  labels:
    project-name: "artem"
    stage: "dev"

kyverno:
  global:
    imagePullSecrets:
      - name: image-pull-secret
  admissionController:
    serviceMonitor:
      enabled: true
      additionalLabels:
        monitoring.instance: "artem-dev"
  backgroundController:
    serviceMonitor:
      enabled: true
      additionalLabels:
        monitoring.instance: "artem-dev"
  cleanupController:
    serviceMonitor:
      enabled: true
      additionalLabels:
        monitoring.instance: "artem-dev"
  reportsController:
    serviceMonitor:
      enabled: true
      additionalLabels:
        monitoring.instance: "artem-dev"
  # FIX: https://github.com/kyverno/kyverno/issues/15116
  kyverno-api:
    labels:
      app.kubernetes.io/managed-by: Helm
    annotations:
      meta.helm.sh/release-name: kyverno
