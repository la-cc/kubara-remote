# AUTO-GENERATED; DO NOT MODIFY;
# This file is auto-generated by kubara and should not be modified manually in any way.
# To customize values, you can add additional files named values-*.yaml to this directory.

namespace:
  labels:
    project-name: "artem"
    stage: "dev"

externalSecrets:

  secretStoreRef:
    kind: ClusterSecretStore
    name: artem-dev


  secrets:
    velero-credentials:
      # name needs to cloud, as the aws plugin for velero looks at cloud per default
      # other key names need to be specified in the backupStorageLocation
      data:
        - secretKey: cloud
          remoteKey: artem/dev/velero/velero_s3_credentials
          remoteKeyProperty: cloud

velero:
  deployNodeAgent: true

  configuration:
    defaultVolumesToFsBackup: true
    backupStorageLocation:
      - name: default
        provider: aws
        bucket: bucket-velero-artem-dev
        credential:
          name: velero-credentials
          key: cloud
        config:
          region: eu01
          s3ForcePathStyle: "true"
    volumeSnapshotLocation: []
volumeSnapshotClass:
  k8sProvider: "stackit"
