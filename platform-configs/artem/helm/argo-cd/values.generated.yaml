argo-cd:
  server:
    ingressGrpc:
      enabled: true
      path: "/argocd"
      ingressClassName: traefik
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress:
      enabled: true
      path: "/argocd"
      ingressClassName: traefik
