dashboardIngress:
  enabled: true
  host: sveltos.controlplane-dev.stackit.run
  path: "/"
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: projectsveltos-dashboard-subdomain-tls

clusterProfiles:
  kro:
    name: kro
    spec:
      syncMode: Continuous
      clusterSelector:
        matchLabels:
          kro: enabled
      helmCharts:
        - repositoryURL: oci://registry.k8s.io/kro/charts
          repositoryName: kro
          chartName: kro
          chartVersion: 0.9.1
          releaseName: kro
          releaseNamespace: kro-system
          helmChartAction: Install
