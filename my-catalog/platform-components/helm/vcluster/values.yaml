vcluster:
  sync:
    toHost:
      ingresses:
        enabled: true
    fromHost:
      nodes:
        enabled: false

  controlPlane:
    distro:
      k8s:
        enabled: true
        image:
          registry: ghcr.io
          repository: loft-sh/kubernetes
          tag: v1.35.0
    proxy:
      extraSANs:
        - vcluster.example.com
    backingStore:
      etcd:
        deploy:
          statefulSet:
            enableServiceLinks: false
    statefulSet:
      persistence:
        volumeClaim:
          enabled: true
          size: 5Gi
      enableServiceLinks: false
    service:
      enabled: true
    ingress:
      enabled: false
    coredns:
      enabled: true
      deployment:
        replicas: 1
      service:
        spec:
          type: ClusterIP

  policies:
    resourceQuota:
      enabled: false
      quota:
        requests.cpu: 20
        requests.memory: 40Gi
        requests.storage: 200Gi
        requests.ephemeral-storage: 50Gi
        limits.cpu: 40
        limits.memory: 80Gi
        limits.ephemeral-storage: 300Gi
        services.nodeports: 1
        services.loadbalancers: 1
        count/endpoints: 40
        count/pods: 40
        count/services: 40
        count/secrets: 100
        count/configmaps: 100
        count/persistentvolumeclaims: 20

    limitRange:
      enabled: auto
      labels: {}
      annotations: {}
      default:
        ephemeral-storage: 16Gi
        memory: 2Gi
        cpu: "4"
      defaultRequest:
        ephemeral-storage: 8Gi
        memory: 1Gi
        cpu: "2"

  rbac:
    role:
      enabled: true
    clusterRole:
      enabled: auto

ingressRouteTCP:
  enabled: false
  host: ""
  entryPoints:
    - websecure
    - web
  service: {}
  tls: {}
  annotations: {}
